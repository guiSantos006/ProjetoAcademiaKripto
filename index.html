<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academia Kripto</title>
    <link rel="stylesheet" href="css/styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <!-- preconnect: pede ao navegador para se conectar ao Google Fonts antecipadamente, 
     acelerando o carregamento da fonte -->

    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500&display=swap" 
    rel="stylesheet">
    <!-- Importa as fontes Barlow Condensed (pesos 700 e 900) e Barlow (400 e 500) do Google Fonts -->

</head>
<body>
    <nav>
         <div class="nav-inner">

                <a href="#home" class="logo">
                 <!-- <a>: link clicável. href="#" mantém na mesma página por enquanto.
                    class="logo" aplica o estilo do logo -->
 
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <!-- SVG: ícone vetorial desenhado diretamente no HTML. viewBox define a área de desenho (0,0 até 24,24).
                        fill="currentColor" faz o ícone herdar a cor do texto do pai (verde, definida no CSS) -->
 
                        <path d="M13 2L4.5 13.5H11L10 22L19.5 10H13L13 2Z"/>
                            <!-- path: o formato do ícone de raio (trovão), desenhado por coordenadas matemáticas -->
 
                    </svg>
 
                    <span class="logo-text">Academia Kripto</span>
                     <!-- <span>: elemento inline para o texto do logo. Recebe fonte maiúscula e espaçamento de 
                        letras pelo CSS -->
 
                </a>
            
            <div class="div-menu">
             <a href="#" class="btn-login">
                <!-- Botão de login: visualmente um link estilizado com ícone -->
 
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <!-- SVG do ícone de entrar (seta para direita). stroke-width=2: espessura da linha do ícone -->
 
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                        <!-- Parte do retângulo (porta) do ícone de login -->
 
                        <polyline points="10 17 15 12 10 7"/>
                        <!-- Seta apontando para direita (chevron) -->
 
                        <line x1="15" y1="12" x2="3" y2="12"/>
                        <!-- Linha horizontal da seta -->
 
                    </svg>
                    Login
                    <!-- Texto visível do botão -->
 
                </a>
                  <a href="#" class="btn-criar">
                <!-- Botão verde de criar conta (o mais destacado visualmente) -->
 
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <!-- Ícone de pessoa com sinal de + (adicionar usuário) -->
 
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                        <!-- Corpo/silhueta da pessoa -->
 
                        <circle cx="9" cy="7" r="4"/>
                        <!-- Cabeça da pessoa (círculo) -->
 
                        <line x1="19" y1="8" x2="19" y2="14"/>
                        <!-- Linha vertical do símbolo + -->
 
                        <line x1="22" y1="11" x2="16" y2="11"/>
                        <!-- Linha horizontal do símbolo + -->
 
                    </svg>
                    Criar Conta
 
                </a>
                <button class="hamburger" id="hamburger" aria-label="Menu">
                    <!-- aria-label="Menu" ajuda leitores de tela para acessibilidade -->
                    
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" 
                    stroke-width="2.2" stroke-linecap="round">
                    <!-- Ícone de 3 linhas horizontais (menu hamburguer) -->
                    
                    <line x1="3" y1="6"  x2="21" y2="6"/>
                    <!-- Linha de cima do hamburguer -->
                    
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <!-- Linha do meio -->
                    
                    <line x1="3" y1="18" x2="21" y2="18"/>
                    <!-- Linha de baixo -->
                    
                    </svg>
                </button>
            </div>
        </div>
    </nav>
    
    <section class="hero">


        <div class="hero-bg"></div>
        <!-- hero-bg: div vazia que recebe a imagem/gradiente de fundo via CSS (position: absolute, cobre toda a section) -->
 
        <div class="hero-overlay"></div>
            <!-- hero-overlay: div vazia que fica sobre o bg com fundo preto semitransparente, 
            escurecendo a foto para o texto ficar legível -->

         <!-- hero-content: container do conteúdo principal (badge, título, tagline, botão). Fica acima do overlay via z-index -->
        <div class="hero-content">
 
            <!-- BADGE PILL ("ENERGIA RADIOATIVA") -->
            <div class="hero-badge">
                <!-- div.hero-badge: o pill (pílula) verde com borda arredondada que aparece acima do título -->
 
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <!-- Ícone de raio dentro do badge -->
 
                    <path d="M13 2L4.5 13.5H11L10 22L19.5 10H13L13 2Z"/>
                    <!-- Formato do raio (mesmo ícone do logo) -->
 
                </svg>
                Energia Radioativa
                <!-- Texto do badge -->
 
            </div>

            <!-- TÍTULO PRINCIPAL -->
            <h1 class="hero-title">

                <span class="line-white">Academia</span>
                <!-- "Academia" em branco — span recebe color: white no CSS -->
 
                <span class="line-green">Kripto</span>
                <!-- "Kripto" em verde neon — span recebe color: var(--green) no CSS -->
 
            </h1>

            <!-- TAGLINE (subtítulo) -->
            <p class="hero-tagline">
                Liberte seu poder interior. Transformação radical através de força sobrenatural.
            </p>
        
            <a href="#" class="hero-cta">Inicie sua transformação</a>
            <!-- a página de cadastro -->
 
        </div>
 

          <!-- INDICADOR DE SCROLL (mouse animado) -->
        <div class="scroll-indicator">
        <!-- Container centralizado na base da hero section -->
 
            <div class="scroll-mouse">
            <!-- Forma de mouse: retângulo com bordas arredondadas desenhado via CSS (width/height/border-radius) -->
 
                <div class="scroll-dot"></div>
                <!-- Bolinhas dentro do mouse que sobe e desce com animação CSS (scrollBounce) -->
 
            </div>
        </div>
        
        </section>
</body>
</html>
